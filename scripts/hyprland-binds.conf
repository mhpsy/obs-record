# obs-record 键位示例 —— source 进 hyprland.conf,或把内容抄进你的键位文件
#
# 前置:先把 CLI 装进 PATH,否则每个 exec 绑定都会静默失败(command not found):
#   cp scripts/obs-record-cli ~/.local/bin/ && chmod +x ~/.local/bin/obs-record-cli
#
# 用 leader 子模式:SUPER+O 进入 obs-record 模式,单键触发命令,Esc/Enter 退出。
# 好处:所有键都收进子模式,不占用任何全局键,和你现有的 Hyprland 绑定零冲突
# ——不像 SUPER+Z/C/T/H 这些热门单键,几乎必然和现成配置撞车(缩放工作区、
# 浮动窗口、移动焦点……)。若 SUPER+O 已被占用,改下面这行的 leader 键即可。
bind = SUPER, O, submap, obs-record
submap = obs-record
bind = , Z, exec, obs-record-cli zoom toggle
bind = , C, exec, obs-record-cli zoom cycle
bind = , S, exec, obs-record-cli spotlight toggle
bind = , T, exec, obs-record-cli trail toggle
bind = , H, exec, obs-record-cli highlight toggle
bind = , A, exec, obs-record-cli pin add
bind = , B, exec, obs-record-cli pin box
bind = , U, exec, obs-record-cli pin undo
bind = , D, exec, obs-record-cli pin clear
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset
